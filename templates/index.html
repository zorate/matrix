<!DOCTYPE html>
<html lang="en" class="h-full bg-black text-green-400 font-mono">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATRIX // ENCLAVE</title>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .brutalist-border { border: 2px solid #047857; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #047857; }
        
        body, html { overflow: hidden; overscroll-behavior: none; }
    </style>
</head>
<body class="h-full w-full flex flex-col m-0 p-0 md:p-4 justify-center items-center select-none bg-zinc-950">

    <div id="core-application" class="w-full max-w-5xl h-full md:h-[85vh] brutalist-border bg-black flex flex-row shadow-2xl relative overflow-hidden">
        
        <div id="sidebar-panel" class="w-full md:w-80 border-r border-green-900 flex flex-col bg-black absolute md:relative z-20 h-full transition-transform duration-200 transform translate-x-0 md:translate-x-0">
            
            <div class="p-4 border-b border-green-900 bg-zinc-950 flex flex-col gap-1.5">
                <span class="text-[10px] text-gray-500 font-bold tracking-wider">LOCAL NODE LOGICAL VECTOR:</span>
                <div class="flex items-center justify-between">
                    <span id="display-my-id" class="text-sm font-bold tracking-wider text-green-500">XXX-XXX</span>
                    <button onclick="exportIdentityToBackupFile()" class="text-[10px] bg-green-950 hover:bg-green-900 text-green-400 px-3 py-1.5 border border-green-800 transition rounded">
                        [ BACKUP ]
                    </button>
                </div>
            </div>

            <div class="p-4 border-b border-green-900 bg-black flex flex-col gap-2">
                <span class="text-[10px] text-gray-500 font-bold tracking-wider">SYSTEM CONFIG ROUTERS:</span>
                <div class="grid grid-cols-2 gap-2">
                    <a href="/pairing" class="text-center text-[11px] font-bold bg-zinc-900 hover:bg-green-950 border border-green-900 text-green-400 py-2 transition uppercase tracking-wider rounded">
                        + Link Peer
                    </a>
                    <a href="/alias" class="text-center text-[11px] font-bold bg-zinc-900 hover:bg-green-950 border border-green-900 text-green-400 py-2 transition uppercase tracking-wider rounded">
                        ~ Set Alias
                    </a>
                </div>
            </div>

            <div id="peer-list" class="flex-1 overflow-y-auto p-2 flex flex-col gap-1 bg-black"></div>
        </div>

        <div class="flex-1 flex flex-col bg-black w-full h-full z-10">
            
            <div class="p-3 md:p-4 border-b border-green-900 bg-zinc-950 flex items-center justify-between min-h-[60px]">
                <button onclick="toggleMobileSidebar(true)" class="md:hidden text-xs border border-green-900 px-2.5 py-1.5 bg-zinc-900 text-green-400 rounded mr-2 font-bold tracking-wider">
                    &lt; ROSTER
                </button>
                
                <div class="flex-1 flex flex-col min-w-0">
                    <span id="chat-header-title" class="text-xs md:text-sm font-bold tracking-wider text-green-400 truncate">UNLINKED MATRIX FIELD</span>
                    <span id="chat-header-id" class="text-[9px] text-gray-600 tracking-widest font-bold mt-0.5 truncate"></span>
                </div>
            </div>

            <div id="chat-feed" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 bg-black">
                <div class="text-center text-gray-700 my-auto text-xs tracking-wide">
                    Establish secure transmission routing channels via the system config routers.
                </div>
            </div>

            <form id="chat-input-form" class="p-2 md:p-3 border-t border-green-900 flex gap-2 bg-zinc-950 items-center">
                <button type="button" id="btn-record-audio" class="w-11 h-11 brutalist-border bg-black text-green-500 hover:bg-green-950 hover:text-green-400 font-bold flex items-center justify-center text-lg transition disabled:opacity-30 disabled:pointer-events-none shrink-0 rounded-md" disabled>
                    🎙️
                </button>
                
                <input type="text" id="chat-message-field" placeholder="Input payload text..." class="flex-1 bg-black p-3 h-11 border border-green-900 text-green-400 text-xs focus:outline-none focus:border-green-500 transition-colors rounded-none" disabled autocomplete="off"/>
                
                <button type="submit" id="btn-send-message" class="px-4 md:px-6 h-11 bg-green-900 hover:bg-green-700 disabled:bg-zinc-900 disabled:text-gray-700 text-black font-bold text-xs tracking-widest transition shrink-0 rounded-md" disabled>
                    TRANSIT
                </button>
            </form>
        </div>
    </div>

    <script>
        function toggleMobileSidebar(show) {
            if (window.innerWidth >= 768) return; 
            const sidebar = document.getElementById("sidebar-panel");
            if (show) {
                sidebar.classList.remove("-translate-x-full");
                sidebar.classList.add("translate-x-0");
            } else {
                sidebar.classList.remove("translate-x-0");
                sidebar.classList.add("-translate-x-full");
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const rosterContainer = document.getElementById("peer-list");
            
            const checkLayoutContext = () => {
                const sidebar = document.getElementById("sidebar-panel");
                if (window.innerWidth < 768) {
                    sidebar.classList.add("-translate-x-full");
                } else {
                    sidebar.classList.remove("-translate-x-full", "translate-x-0");
                }
            };
            
            window.addEventListener('resize', checkLayoutContext);
            checkLayoutContext();

            rosterContainer.addEventListener("click", (e) => {
                if (e.target.closest("button")) {
                    toggleMobileSidebar(false);
                }
            });
        });
    </script>
    <script src="/static/js/chat.js?v=3"></script>
</body>
</html>
