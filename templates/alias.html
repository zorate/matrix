<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identity Profile Setup</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --accent:#10b981;
            --accent-dark:#047857;
            --glass:rgba(255,255,255,0.05);
            --glass-border:rgba(255,255,255,0.08);
        }

        html,
        body{
            width:100%;
            min-height:100%;
            overflow-x:hidden;
            font-family:Inter, Arial, sans-serif;
            background:
                radial-gradient(circle at top left,
                    rgba(16,185,129,.14),
                    transparent 35%),
                radial-gradient(circle at bottom right,
                    rgba(16,185,129,.08),
                    transparent 40%),
                #050505;
            color:#fff;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:
                max(20px, env(safe-area-inset-top))
                20px
                max(20px, env(safe-area-inset-bottom))
                20px;
            position:relative;
        }

        body::before{
            content:"";
            position:fixed;
            width:320px;
            height:320px;
            top:-120px;
            left:-120px;
            background:var(--accent);
            opacity:.08;
            filter:blur(120px);
            pointer-events:none;
        }

        body::after{
            content:"";
            position:fixed;
            width:320px;
            height:320px;
            bottom:-120px;
            right:-120px;
            background:var(--accent-dark);
            opacity:.08;
            filter:blur(120px);
            pointer-events:none;
        }

        .secure-container{
            width:100%;
            max-width:520px;
        }

        .page-header{
            text-align:center;
            margin-bottom:22px;
        }

        .back-arrow-btn{
            display:inline-block;
            text-decoration:none;
            color:var(--accent);
            font-weight:600;
            margin-bottom:14px;
            transition:.25s ease;
        }

        .back-arrow-btn:hover{
            color:#34d399;
        }

        .page-header h2{
            font-size:2rem;
            font-weight:700;
            letter-spacing:.3px;
        }

        .form-wrapper{
            background:var(--glass);
            border:1px solid var(--glass-border);
            border-radius:24px;
            padding:30px;
            backdrop-filter:blur(22px);
            -webkit-backdrop-filter:blur(22px);

            box-shadow:
                0 12px 40px rgba(0,0,0,.45),
                inset 0 1px 0 rgba(255,255,255,.08);
        }

        .identity-card{
            background:rgba(255,255,255,.04);
            border:1px solid rgba(255,255,255,.06);
            border-radius:16px;
            padding:16px;
            margin-bottom:24px;
        }

        .identity-card p{
            color:#d1d5db;
            font-size:.95rem;
            line-height:1.6;
        }

        .input-group{
            margin-bottom:22px;
        }

        .input-group label{
            display:block;
            margin-bottom:10px;
            color:#9ca3af;
            font-size:.92rem;
            font-weight:600;
        }

        .input-group input{
            width:100%;
            height:56px;
            border-radius:14px;
            border:1px solid rgba(255,255,255,.08);
            background:rgba(255,255,255,.05);
            color:white;
            font-size:1rem;
            padding:0 16px;
            outline:none;
            transition:.25s ease;
        }

        .input-group input:focus{
            border-color:var(--accent);
            box-shadow:
                0 0 0 4px rgba(16,185,129,.18);
        }

        .input-group input::placeholder{
            color:#6b7280;
        }

        .action-btn-primary{
            width:100%;
            min-height:56px;
            border:none;
            border-radius:14px;
            cursor:pointer;
            color:white;
            font-size:1rem;
            font-weight:700;

            background:
                linear-gradient(
                    135deg,
                    var(--accent-dark),
                    var(--accent)
                );

            transition:.25s ease;
        }

        .action-btn-primary:hover{
            transform:translateY(-2px);
            box-shadow:
                0 12px 30px rgba(16,185,129,.25);
        }

        .action-btn-primary:active{
            transform:translateY(0);
        }

        .status-message-area{
            margin-top:18px;
            min-height:24px;
            text-align:center;
            color:#d1d5db;
            font-size:.95rem;
        }

        @media (max-width:640px){

            body{
                align-items:flex-start;
                padding-top:32px;
            }

            .page-header h2{
                font-size:1.55rem;
            }

            .form-wrapper{
                padding:22px;
                border-radius:20px;
            }

            .identity-card{
                padding:14px;
            }

            .identity-card p{
                font-size:.9rem;
            }

            .input-group input{
                height:54px;
                font-size:16px; /* prevents iOS zoom */
            }

            .action-btn-primary{
                min-height:54px;
            }
        }

        @media (max-width:380px){

            .form-wrapper{
                padding:18px;
            }

            .page-header h2{
                font-size:1.35rem;
            }
        }
    </style>
</head>

<body>

    <div class="secure-container">

        <header class="page-header">
            <a href="/" class="back-arrow-btn">← Back to Chat</a>
            <h2>Profile Identity</h2>
        </header>

        <main class="form-wrapper">

            <div class="identity-card">
                <p>
                    Configure the display alias that other participants
                    will recognize during secure communications.
                </p>
            </div>

            <div class="input-group">
                <label for="aliasNameInput">Local User Alias</label>

                <input
                    type="text"
                    id="aliasNameInput"
                    placeholder="Enter your display alias..."
                    autocomplete="off"
                >
            </div>

            <button
                id="saveAliasBtn"
                class="action-btn-primary"
            >
                Commit Identity Changes
            </button>

            <div id="aliasStatusFeedback" class="status-message-area"></div>

        </main>

    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>

</body>
</html>
