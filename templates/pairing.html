<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Peer Pairing</title>

    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body, html {
            height:100%;
            overflow:hidden;
            overscroll-behavior:none;
            font-family:Inter, Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(16,185,129,.15), transparent 40%),
                radial-gradient(circle at bottom right, rgba(34,197,94,.10), transparent 40%),
                #050505;
            color:white;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .secure-container{
            width:100%;
            max-width:550px;
        }

        .page-header{
            text-align:center;
            margin-bottom:24px;
        }

        .back-arrow-btn{
            display:inline-block;
            color:#10b981;
            text-decoration:none;
            font-weight:600;
            margin-bottom:12px;
            transition:all .3s ease;
        }

        .back-arrow-btn:hover{
            color:#34d399;
        }

        .page-header h2{
            font-size:2rem;
            font-weight:700;
            letter-spacing:.5px;
        }

        .form-wrapper{
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:24px;
            padding:32px;
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            box-shadow:
                0 10px 40px rgba(0,0,0,.45),
                inset 0 1px 0 rgba(255,255,255,.08);
        }

        .instruction-card{
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:16px;
            padding:16px;
            margin-bottom:24px;
            color:#d1d5db;
            line-height:1.6;
            font-size:.95rem;
        }

        .input-group{
            margin-bottom:24px;
        }

        .input-group label{
            display:block;
            margin-bottom:10px;
            color:#9ca3af;
            font-size:.9rem;
            font-weight:600;
        }

        .input-group input{
            width:100%;
            padding:16px;
            border-radius:14px;
            border:1px solid rgba(255,255,255,.08);
            background:rgba(255,255,255,.05);
            color:white;
            font-size:1rem;
            outline:none;
            transition:.3s ease;
        }

        .input-group input:focus{
            border-color:#10b981;
            box-shadow:0 0 0 4px rgba(16,185,129,.18);
        }

        .input-group input::placeholder{
            color:#6b7280;
        }

        .action-btn-primary{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            cursor:pointer;
            font-size:1rem;
            font-weight:700;
            color:white;
            background:linear-gradient(
                135deg,
                #047857,
                #10b981
            );
            transition:all .3s ease;
        }

        .action-btn-primary:hover{
            transform:translateY(-2px);
            box-shadow:0 12px 30px rgba(16,185,129,.25);
        }

        .action-btn-primary:active{
            transform:translateY(0);
        }

        .status-message-area{
            margin-top:20px;
            text-align:center;
            color:#d1d5db;
            min-height:24px;
        }

        /* Decorative glow effects */
        body::before{
            content:"";
            position:fixed;
            top:-200px;
            left:-200px;
            width:400px;
            height:400px;
            background:#10b981;
            opacity:.08;
            filter:blur(120px);
            pointer-events:none;
        }

        body::after{
            content:"";
            position:fixed;
            bottom:-200px;
            right:-200px;
            width:400px;
            height:400px;
            background:#059669;
            opacity:.08;
            filter:blur(120px);
            pointer-events:none;
        }

        @media (max-width: 640px){

            .page-header h2{
                font-size:1.6rem;
            }

            .form-wrapper{
                padding:24px;
            }

            .instruction-card{
                font-size:.9rem;
            }
        }
    </style>
</head>

<body>

    <div class="secure-container">

        <header class="page-header">
            <a href="/" class="back-arrow-btn">← Back to Chat</a>
            <h2>Establish Secure Pipeline</h2>
        </header>

        <main class="form-wrapper">

            <div class="instruction-card">
                <p>
                    Input your contact's unique 6-character identity key
                    to exchange cryptographic handshakes and initialize
                    an end-to-end encrypted session.
                </p>
            </div>

            <div class="input-group">
                <label for="peerKeyInput">Target Identity Key</label>
                <input
                    type="text"
                    id="peerKeyInput"
                    maxlength="6"
                    placeholder="e.g., X9R2ZT"
                    autocomplete="off"
                    bytes-target
                >
            </div>

            <button id="executePairingBtn" class="action-btn-primary">
                Initialize Secure Connection
            </button>

            <div id="pairingStatusFeedback" class="status-message-area"></div>

        </main>

    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    {# <script src="{{ url_for('static', filename='js/crypto_engine.js') }}"></script> #}

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>

</body>
</html>
